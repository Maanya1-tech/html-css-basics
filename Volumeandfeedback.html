<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range</title>
</head>
<body>
    <form action="action">
        Select your sound level
        <input type="range" min="0"max="100"step="20"value="10"name="vol">
        <label for="volume">Volume</label>
        
        <div>
            <label for="Feedback">Please Give your valuable feedback</label>
            <textarea name="feedback" id="feedback" placeholder="Click here for feedbacks" rows="5"cols="100"></textarea>
        </div>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
