<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio</title>
</head>
<body>
    <form action="action">
        Choose your fruit
        <div>
      <input type="radio"name="fruit"id="apple"value="apple">
      <label for="apple">Apple</label>
      </div>
      <div>
      <input type="radio"name="fruit"id="mango"value="mango">
      <label for="mango">mango</label >
        </div>
        <div>
      <input type="radio"name="fruit"id="orange"value="orange">
      <label for="orange">orange</label>
      </div>
      Choose your colour
      <div>
        <input type="checkbox"name="colorus"id="blue"value="blue">
        <label for="blue">blue</label>
      </div>
      <div>
        <input type="checkbox"name="colors"id="purple"value="purple">
        <label for="purple">purple</label>      
    </div>
    <div>
        <input type="checkbox"name="orange"id="orange"value="orange">
        <label for="orange">orange</label>
    </div>
      <button type="submit">submit</button>   
      
    </form>
</body>
</html>
