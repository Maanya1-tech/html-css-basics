<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="/action">
    <label for="username">Enter user name</label>
        
    <input type="text" placeholder="Username"name="username">
    
<br>
<label for="password">Enter password</label>
     
    <input type="password" placeholder="Enter password">
    <br>
    <label for="Phone Number">Enter phone number</label>
    
    <input type="number" placeholder="Phone Number">
    <br>
    <label for="color">Enter color</label>
    
    <input type="color" placeholder="Enter color"name="color">
    <br>
    <label for="age">Enter age</label>
    
    <input type="age"placeholder="Enter age"name="age">
    <br>
    <label for="date">select date</label>
    

    <input type="date"placeholder="Enter date">
    <br>
    <label for="time">Select the time</label>
    
    <input type="time"placeholder="Enter time">
    <br>
    <button type="submit">submit</button>
    </form>
    <form action="https://www.youtube.com/results?search_query">
    <label for="search">search on youtube</label>
    <input type="search" placeholder="Search on YT" name="search_query">

    
    </form>
</body>
</html>
